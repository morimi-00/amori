<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>amori — House Manual</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
  /* ============================================================
     AIRBNB-STYLE THEME
     ============================================================ */
  :root {
    --primary:       #FF5A5F;
    --primary-light: #FFF0F0;
    --primary-dark:  #D93025;
    --accent:        #FF5A5F;
    --bg:            #F7F7F7;
    --surface:       #FFFFFF;
    --text:          #222222;
    --text-muted:    #717171;
    --border:        #EBEBEB;
    --radius:        12px;
    --shadow:        0 1px 2px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.05);
    --shadow-lg:     0 6px 20px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
    --font: 'Inter','Noto Sans JP','Noto Sans KR','Noto Sans SC',system-ui,sans-serif;
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    font-size: 15px;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================================
     STICKY HEADER — Airbnb style
     ============================================================ */
  .site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    padding: 14px 20px;
    background: transparent;
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }
  .site-header.scrolled {
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 1px 0 var(--border);
  }
  .site-header__inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .site-header__logo {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    transition: color 0.3s;
    white-space: nowrap;
  }
  .site-header.scrolled .site-header__logo { color: var(--primary); }
  .lang-bar {
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
  }
  .lang-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 24px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: var(--font);
    letter-spacing: 0.02em;
  }
  .lang-btn:hover { background: rgba(255,255,255,0.3); }
  .lang-btn.active { background: #fff; color: var(--primary); border-color: #fff; }
  .site-header.scrolled .lang-btn {
    background: transparent;
    color: var(--text-muted);
    border-color: var(--border);
  }
  .site-header.scrolled .lang-btn.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  /* ============================================================
     HERO — Airbnb full-screen
     ============================================================ */
  .hero {
    position: relative;
    height: 100svh;
    min-height: 480px;
    overflow: hidden;
    background: #1a1a1a;
    display: flex;
    align-items: flex-end;
  }
  .hero__img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    transform: scale(1.02);
    transition: transform 6s ease;
  }
  .hero__img.loaded { transform: scale(1); }
  .hero__overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.0) 0%,
      rgba(0,0,0,0.1) 50%,
      rgba(0,0,0,0.60) 100%
    );
  }
  .hero__placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #1a1a1a 0%, #3a2a2a 100%);
    color: rgba(255,255,255,0.5);
    gap: 10px;
    font-size: 13px;
  }
  .hero__placeholder-icon { font-size: 44px; }
  .hero__content {
    position: relative;
    z-index: 2;
    width: 100%;
    padding: 0 24px 56px;
    color: #fff;
  }
  .hero__tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: var(--primary);
    color: #fff;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .hero__title {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 16px rgba(0,0,0,0.3);
    line-height: 1.15;
  }
  .hero__sub {
    font-size: 15px;
    opacity: 0.85;
    margin-top: 6px;
    font-weight: 400;
  }
  .hero__chips {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .hero__chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 24px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
    letter-spacing: 0.01em;
  }
  .hero__chip:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.7); }
  .hero__scroll {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-size: 20px;
    animation: bounce 2.2s infinite;
    z-index: 2;
    line-height: 1;
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(8px); }
  }

  /* ============================================================
     MAIN CONTENT
     ============================================================ */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 100px;
  }

  /* ============================================================
     SECTION CARDS — Airbnb style
     ============================================================ */
  .section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.45s ease, transform 0.45s ease, box-shadow 0.2s, border-color 0.2s;
  }
  .section.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .section:hover {
    box-shadow: var(--shadow-lg);
    border-color: #d0d0d0;
  }

  .section__header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .section__icon {
    width: 38px;
    height: 38px;
    background: var(--primary-light);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .section__title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .section__body {
    padding: 20px;
  }

  /* ============================================================
     CONTENT COMPONENTS
     ============================================================ */

  /* Wi-Fi */
  .wifi-box {
    background: #FAFAFA;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    text-align: center;
    margin-bottom: 10px;
  }
  .wifi-box__label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .wifi-box__value { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: 0.04em; }
  .wifi-box__row   { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .wifi-box__copy  {
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  .wifi-box__copy:hover  { background: #444; }
  .wifi-box__copy:active { transform: scale(0.96); }
  .wifi-box__copy.copied { background: #16a34a; }

  /* Steps (numbered list) */
  .steps { list-style: none; counter-reset: step; }
  .steps li {
    counter-increment: step;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.6;
  }
  .steps li:last-child { border-bottom: none; }
  .steps li::before {
    content: counter(step);
    background: var(--text);
    color: #fff;
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* Rules (icon list) */
  .rules { list-style: none; }
  .rules li {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.6;
  }
  .rules li:last-child { border-bottom: none; }
  .rules li .bullet { font-size: 18px; flex-shrink: 0; line-height: 1.4; }

  /* Notices */
  .notice {
    border-left: 3px solid #DDDDDD;
    background: #F7F7F7;
    padding: 12px 14px;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    margin-top: 12px;
    line-height: 1.7;
    color: var(--text-muted);
  }
  .notice--warning { border-left-color: #E31C5F; background: #FFF0F3; color: #c0143c; }
  .notice--blue    { border-left-color: var(--primary); background: var(--primary-light); color: var(--text); }

  /* Info grid (check-in/out) */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-card {
    background: #FAFAFA;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
  }
  .info-card__icon  { font-size: 22px; margin-bottom: 6px; }
  .info-card__label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .info-card__value { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 4px; letter-spacing: -0.02em; }

  /* Contact cards */
  .contact-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    transition: box-shadow 0.2s, border-color 0.2s;
    background: var(--surface);
  }
  .contact-card:hover { box-shadow: var(--shadow); border-color: #d0d0d0; }
  .contact-card__icon { font-size: 26px; flex-shrink: 0; }
  .contact-card__name { font-weight: 600; font-size: 13px; color: var(--text-muted); }
  .contact-card__tel  {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    display: block;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .contact-card__note { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Spot cards */
  .spot-card {
    display: flex;
    gap: 14px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .spot-card:last-child { border-bottom: none; }
  .spot-card__icon { font-size: 26px; flex-shrink: 0; line-height: 1.2; }
  .spot-card__name { font-weight: 700; font-size: 14px; }
  .spot-card__desc { font-size: 13px; color: var(--text-muted); }
  .spot-card__dist { font-size: 12px; color: var(--primary); font-weight: 600; margin-top: 3px; }

  /* FAQ */
  .faq-item { border-bottom: 1px solid var(--border); }
  .faq-item:last-child { border-bottom: none; }
  .faq-q {
    font-weight: 700;
    font-size: 14px;
    padding: 13px 0 5px;
    color: var(--primary-dark);
  }
  .faq-q::before { content: "Q. "; color: var(--accent); }
  .faq-a {
    font-size: 13px;
    color: var(--text-muted);
    padding-bottom: 13px;
    line-height: 1.8;
  }
  .faq-a::before { content: "A. "; font-weight: 700; color: var(--primary); }

  /* Form link button */
  .form-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--primary);
    color: #fff !important;
    text-decoration: none;
    padding: 14px 18px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    margin-top: 12px;
    transition: background 0.2s, transform 0.1s;
  }
  .form-link:hover  { background: var(--primary-dark); }
  .form-link:active { transform: scale(0.98); }

  /* Welcome Card */
  .welcome-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 24px;
    margin-bottom: 20px;
    text-align: center;
    border-top: 4px solid var(--primary);
  }
  .welcome-card__icon { font-size: 36px; margin-bottom: 10px; }
  .welcome-card__msg {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
  }
  .welcome-card__host {
    margin-top: 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary-dark);
    letter-spacing: 0.04em;
  }

  /* Hero Welcome overlay */
  .hero__welcome {
    font-size: 13px;
    opacity: 0.9;
    margin-top: 14px;
    line-height: 1.85;
    font-style: italic;
    color: #fff;
    max-width: 460px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  /* Spot card link */
  a.spot-card { text-decoration: none; color: inherit; display: flex; }
  a.spot-card:hover { background: var(--primary-light); border-radius: 8px; }

  /* Inline helpers */
  p { margin-bottom: 8px; font-size: 14px; }
  strong { color: var(--primary-dark); }

  /* ============================================================
     FLOATING TOC BUTTON (FAB)
     ============================================================ */
  .toc-fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    border: none;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(139,111,78,0.45);
    cursor: pointer;
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .toc-fab:hover { background: var(--primary-dark); transform: scale(1.06); }
  .toc-fab.open  { background: var(--primary-dark); transform: rotate(90deg); }

  /* TOC Overlay */
  .toc-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 400;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .toc-overlay.show { opacity: 1; pointer-events: auto; }

  /* TOC Bottom Sheet */
  .toc-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-radius: 22px 22px 0 0;
    z-index: 500;
    transform: translateY(100%);
    transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 80svh;
    overflow-y: auto;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  .toc-sheet.open { transform: translateY(0); }

  .toc-sheet__bar {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 10px 20px 12px;
    border-bottom: 1px solid var(--border);
    z-index: 1;
  }
  .toc-sheet__handle {
    width: 38px;
    height: 4px;
    background: #CBD5E1;
    border-radius: 2px;
    margin: 0 auto 12px;
  }
  .toc-sheet__title {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary-dark);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: center;
  }
  .toc-sheet__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 16px 16px 20px;
  }
  .toc__item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--primary-dark);
    text-decoration: none;
    padding: 10px 12px;
    background: var(--primary-light);
    border-radius: 10px;
    border: 1px solid rgba(139,111,78,0.15);
    transition: background 0.15s, transform 0.1s;
    font-weight: 500;
  }
  .toc__item:hover  { background: #EAD9C8; }
  .toc__item:active { transform: scale(0.97); }
  .toc__item .icon  { font-size: 16px; flex-shrink: 0; }

  /* ============================================================
     FOOTER
     ============================================================ */
  .footer {
    text-align: center;
    padding: 24px 20px 40px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
  }
  </style>
</head>

</nav>

  const hero = document.getElementById('hero-area');
  const img  = PROPERTY_IMAGES.find(src => src && src.trim());
  const sub  = I18N[currentLang].header_sub;

  const bgHTML = img
    ? `<img class="hero__img" src="${img}" alt="${PROPERTY.name}">`
    : `<div class="hero__placeholder"><div class="hero__placeholder-icon">📷</div><div>PROPERTY_IMAGES に写真を追加してください</div></div>`;

  hero.innerHTML = `
    ${bgHTML}
    <div class="hero__overlay"></div>
    <div class="hero__content">
      <div class="hero__tag">House Manual</div>
      <h1 class="hero__title">${PROPERTY.name}</h1>
      <div class="hero__sub" data-i18n="header_sub">${sub}</div>

        <a class="hero__chip" href="#section-checkin">🔴 OUT ${PROPERTY.checkout_time}</a>
        <a class="hero__chip" href="#section-wifi">📶 Wi-Fi</a>

    <div class="hero__scroll">↓</div>
  `;
}

// ── Main ──
function renderMain() {
  document.getElementById('main-content').innerHTML =
    getSortedSections().map((sec, i) => `
    <div class="section" id="section-${sec.id}" style="transition-delay:${Math.min(i*0.04, 0.3)}s">
      <div class="section__header">
        <div class="section__icon">${sec.icon}</div>
        <div class="section__title">${I18N[currentLang][sec.title_key]}</div>
      </div>
      <div class="section__body">${sec.render(currentLang)}</div>
    </div>
  `).join('');
  initScrollAnim();
  initWifiCopy();
}

// ── TOC ──
function renderTOC() {
  document.getElementById('toc-grid').innerHTML = getSortedSections().map(sec => `
    <a class="toc__item" href="#section-${sec.id}" onclick="closeTOC()">
      <span class="icon">${sec.icon}</span>
      <span>${I18N[currentLang][sec.title_key]}</span>
    </a>
  `).join('');
}

// ── Language switch ──
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick') === `setLang('${lang}')`);
  });
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  renderTOC();
  const hw = document.getElementById('hero-welcome');
  if (hw) hw.innerHTML = I18N[lang].welcome_msg;
  getSortedSections().forEach(sec => {
    const titleEl = document.querySelector(`#section-${sec.id} .section__title`);
    if (titleEl) titleEl.textContent = I18N[lang][sec.title_key];
    const bodyEl  = document.querySelector(`#section-${sec.id} .section__body`);
    if (bodyEl)  bodyEl.innerHTML = sec.render(lang);
  });
  initWifiCopy();
}

// ── Scroll Animation ──
function initScrollAnim() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.07, rootMargin: '0px 0px -32px 0px' });
  document.querySelectorAll('.section').forEach(el => obs.observe(el));
}

// ── Sticky Header ──
function initHeader() {
  const hdr = document.getElementById('site-header');
  window.addEventListener('scroll', () => {
    hdr.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });
}

// ── TOC Bottom Sheet ──
let tocOpen = false;
function openTOC() {
  tocOpen = true;
  document.getElementById('toc-sheet').classList.add('open');
  document.getElementById('toc-overlay').classList.add('show');
  document.getElementById('toc-fab').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeTOC() {
  tocOpen = false;
  document.getElementById('toc-sheet').classList.remove('open');
  document.getElementById('toc-overlay').classList.remove('show');
  document.getElementById('toc-fab').classList.remove('open');
  document.body.style.overflow = '';
}
function initTOC() {
  document.getElementById('toc-fab').addEventListener('click', () => tocOpen ? closeTOC() : openTOC());
  document.getElementById('toc-overlay').addEventListener('click', closeTOC);
}

// ── Wi-Fi Copy Button ──
function initWifiCopy() {
  document.querySelectorAll('.wifi-box__copy').forEach(btn => {
    btn.addEventListener('click', async () => {
      const text = btn.dataset.copy;
      const lang = currentLang;
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      const orig = btn.textContent;
      btn.textContent = I18N[lang].copied;
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = I18N[lang].copy; btn.classList.remove('copied'); }, 2200);
    });
  });
}

// ── Init ──
renderHero();
renderMain();
renderTOC();
initHeader();
initTOC();
</script>
</body>
</html>
